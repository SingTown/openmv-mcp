name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: openmv-mcp-server
          skip-github-release: true

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macos-arm64,    ext: tar.gz }
          - { os: ubuntu-latest,  name: linux-x86_64,   ext: tar.gz }
          - { os: windows-latest, name: windows-x86_64, ext: zip    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set VERSION
        shell: bash
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libudev-dev cmake

      - name: Download resources (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -L -o /tmp/openmv-ide-resources.zip https://github.com/openmv/openmv-ide/releases/download/v4.8.9/openmv-ide-resources-4.8.9.zip
          unzip -o /tmp/openmv-ide-resources.zip -d resource

      - name: Download resources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/openmv/openmv-ide/releases/download/v4.8.9/openmv-ide-resources-4.8.9.zip -OutFile $env:TEMP\openmv-ide-resources.zip
          Expand-Archive -Path $env:TEMP\openmv-ide-resources.zip -DestinationPath resource -Force

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_CLANG_TIDY=OFF -DOPENMV_MCP_VERSION=${{ env.VERSION }}

      - name: Build
        run: cmake --build build --config Release -j

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          PKG="openmv_mcp_server-${VERSION}-${{ matrix.name }}"
          mkdir -p "dist/${PKG}"
          cp build/openmv_mcp_server "dist/${PKG}/"
          cp README.md LICENSE "dist/${PKG}/" 2>/dev/null || true
          tar -C dist -czf "dist/${PKG}.tar.gz" "${PKG}"
          rm -rf "dist/${PKG}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $pkg = "openmv_mcp_server-$env:VERSION-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path "dist/$pkg" | Out-Null
          Copy-Item "build/Release/openmv_mcp_server.exe" "dist/$pkg/"
          Copy-Item README.md,LICENSE "dist/$pkg/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/$pkg" -DestinationPath "dist/$pkg.zip"
          Remove-Item -Recurse -Force "dist/$pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/openmv_mcp_server-${{ env.VERSION }}-${{ matrix.name }}.${{ matrix.ext }}

  publish:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          BODY: ${{ needs.release-please.outputs.body }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes "$BODY" \
            --verify-tag \
            dist/*/*
