name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install tools
        run: brew install clang-format

      - name: Configure
        run: cmake -B build

      - name: Check format
        run: cmake --build build --target check

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: openmv_mcp_server-macos
          path: build/openmv_mcp_server

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: openmv_mcp_server-windows
          path: build/Release/openmv_mcp_server.exe

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: vscode-extension
        run: pnpm install

      - name: Lint
        working-directory: vscode-extension
        run: pnpm run lint

      - name: Build
        working-directory: vscode-extension
        run: pnpm run build
