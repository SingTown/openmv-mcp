name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install tools
        run: brew install clang-format

      - name: Configure
        run: cmake -B build

      - name: Check format
        run: cmake --build build --target check

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure
